global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'spark'
    static_configs:
      - targets: ['spark-master:8080', 'spark-worker:8081']

  - job_name: 'bentoml'
    static_configs:
      - targets: ['bentoml:3000']
