
x-spark-common: &spark-common
  image: bitnamilegacy/spark:3.5.6
  environment:
    - SPARK_RPC_AUTHENTICATION_ENABLED=no
    - SPARK_RPC_ENCRYPTION_ENABLED=no
    - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
    - SPARK_SSL_ENABLED=no
    - SPARK_USER=spark
    - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-admin}
    - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-adminpassword}
    - SPARK_EXTRA_CLASSPATH=/opt/bitnami/spark/jars/*
  working_dir: /opt/project
  volumes:
    - .:/opt/project
    - ./config/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf
    - spark-logs:/opt/bitnami/spark/logs
  networks:
    - icu_readmission_network

services:

  # ============================================================
  # POSTGRESQL DATABASE
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-adminpassword}
      POSTGRES_MULTIPLE_DATABASES: airflow,mlflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./config/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - icu_readmission_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # MINIO OBJECT STORAGE
  # ============================================================
  minio:
    image: minio/minio:RELEASE.2024-03-15T01-07-19Z
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-adminpassword}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - icu_readmission_network
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER:-admin} $${MINIO_ROOT_PASSWORD:-adminpassword};
      /usr/bin/mc mb --ignore-existing myminio/lakehouse;
      /usr/bin/mc mb --ignore-existing myminio/mlflow-artifacts;
      /usr/bin/mc mb --ignore-existing myminio/checkpoints;
      echo 'Buckets created successfully';
      exit 0;
      "
    networks:
      - icu_readmission_network

  # ============================================================
  # KAFKA (KRaft mode)
  # ============================================================
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - icu_readmission_network

  # ============================================================
  # APACHE SPARK CLUSTER
  # ============================================================
  spark-master:
    <<: *spark-common
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_USER=spark
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-admin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-adminpassword}
      - SPARK_MASTER_OPTS=-Dspark.deploy.defaultCores=2
    ports:
      - "${SPARK_UI_PORT:-8080}:8080"
      - "${SPARK_MASTER_PORT:-7077}:7077"

  spark-worker:
    <<: *spark-common
    container_name: spark-worker
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_USER=spark
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-admin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-adminpassword}
    ports:
      - "8081:8081"
    depends_on:
      - spark-master

  # ============================================================
  # MLFLOW TRACKING SERVER
  # ============================================================
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.0
    container_name: mlflow
    ports:
      - "5000:5000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://mlflow:mlflow@postgres:5432/mlflow
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=s3://mlflow-artifacts/
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-admin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-adminpassword}
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - MLFLOW_S3_IGNORE_TLS=true
    command: >
      sh -c "pip install --timeout 120 --retries 10 --no-cache-dir psycopg2-binary && mlflow server --backend-store-uri postgresql://mlflow:mlflow@postgres:5432/mlflow --default-artifact-root s3://mlflow-artifacts/ --host 0.0.0.0 --port 5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - icu_readmission_network

  # ============================================================
  # APACHE AIRFLOW ORCHESTRATOR
  # ============================================================
  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
      network: host
    container_name: airflow-init
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - _AIRFLOW_DB_MIGRATE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=${AIRFLOW_ADMIN_USERNAME:-admin}
      - _AIRFLOW_WWW_USER_PASSWORD=${AIRFLOW_ADMIN_PASSWORD:-adminpassword}
    command: version
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - icu_readmission_network

  airflow-webserver:
    build:
      context: .
      dockerfile: airflow/Dockerfile
      network: host
    container_name: airflow-webserver
    ports:
      - "${AIRFLOW_PORT:-8090}:8080"
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__WEBSERVER__SECRET_KEY=bigdatalab2026
      - AIRFLOW__WEBSERVER__WORKERS=2
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPARK_CONF_DIR=/opt/airflow/project/config
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-admin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-adminpassword}
    command: webserver
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
      - .:/opt/airflow/project
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - icu_readmission_network

  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow/Dockerfile
      network: host
    container_name: airflow-scheduler
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPARK_CONF_DIR=/opt/airflow/project/config
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-admin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-adminpassword}
    command: scheduler
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
      - .:/opt/airflow/project
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - icu_readmission_network

  # ============================================================
  # BENTOML CLINICAL MODEL SERVING API
  # ============================================================
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
      network: host
    container_name: api
    ports:
      - "${API_PORT:-3002}:3002"
    volumes:
      - ./src:/opt/project/src
      - ./models:/opt/project/models
      - ./examples:/opt/project/examples
    environment:
      - MODEL_PATH=/opt/project/models/best_readmission_model.joblib
    networks:
      - icu_readmission_network

  # ============================================================
  # PROMETHEUS METRICS MONITORING
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - icu_readmission_network

  # ============================================================
  # GRAFANA LIVE TELEMETRY DASHBOARD
  # ============================================================
  grafana:
    image: grafana/grafana:10.3.3
    container_name: grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-adminpassword}
      - GF_SECURITY_ADMIN_USER=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./config/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./dashboards:/opt/dashboards
    depends_on:
      - prometheus
    networks:
      - icu_readmission_network

# ============================================================
# SHARED NETWORKS AND VOLUMES
# ============================================================
networks:
  icu_readmission_network:
    driver: bridge
    name: icu_readmission_network

volumes:
  spark-logs:
  kafka-data:
  minio-data:
  postgres-data:
  airflow-logs:
  prometheus-data:
  grafana-data:
