# ================================================================
# Z5008 Big Data Lab — Spark Default Configuration
# ================================================================

# Apache Iceberg SQL Extensions and Catalogs
spark.sql.extensions                   org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.demo                 org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.demo.type            hadoop
spark.sql.catalog.demo.warehouse       s3a://lakehouse/warehouse/

# S3/MinIO Configuration
spark.hadoop.fs.s3a.endpoint           http://minio:9000
spark.hadoop.fs.s3a.path.style.access  true
spark.hadoop.fs.s3a.impl               org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.connection.ssl.enabled  false
spark.hadoop.fs.s3a.aws.credentials.provider  com.amazonaws.auth.EnvironmentVariableCredentialsProvider

# Pre-downloaded JARs (bypasses slow Ivy/Maven network resolution)
spark.jars                             /home/airflow/.ivy2/jars/iceberg-spark-runtime-3.5_2.12-1.5.0.jar,/home/airflow/.ivy2/jars/hadoop-aws-3.3.4.jar,/home/airflow/.ivy2/jars/aws-java-sdk-bundle-1.12.262.jar,/home/airflow/.ivy2/jars/spark-sql-kafka-0-10_2.12-3.5.1.jar,/home/airflow/.ivy2/jars/spark-token-provider-kafka-0-10_2.12-3.5.1.jar,/home/airflow/.ivy2/jars/kafka-clients-3.4.1.jar,/home/airflow/.ivy2/jars/lz4-java-1.8.0.jar,/home/airflow/.ivy2/jars/snappy-java-1.1.10.3.jar,/home/airflow/.ivy2/jars/commons-pool2-2.11.1.jar,/home/airflow/.ivy2/jars/wildfly-openssl-1.0.7.Final.jar

# Performance settings
spark.sql.adaptive.enabled             true
spark.sql.adaptive.coalescePartitions.enabled  true
spark.sql.shuffle.partitions           4
spark.default.parallelism              4

# UI settings (event logging disabled - path /opt/bitnami/spark/logs only exists on Spark containers)
spark.ui.enabled                       false
spark.eventLog.enabled                 false
